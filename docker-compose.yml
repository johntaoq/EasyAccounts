version: '3.8'

services:

  #数据库端，请勿分开部署Mysql与服务端，内部有网桥链接，分开部署会导致服务端无法连接数据库
  #请勿修改"db"服务的名称，否则会导致服务端无法连接数据库
  db:   
    restart: always
    container_name: easy_accounts_db
    image: 775495797/easyaccounts-mysql:1.0.0
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: easy_accounts                #数据库root密码，自行修改，修改完需要修改Server中的数据库密码
      MYSQL_DATABASE: yd_jz                             #数据库名称，请勿修改
    volumes:
      - ./Database/data:/var/lib/mysql
      # - ./Database/init:/docker-entrypoint-initdb.d   #如若需要恢复数据库，请将初始化脚本放置在Database/init目录下，并解开此行注释
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --explicit_defaults_for_timestamp=true
      --lower_case_table_names=1
    networks:
      - easy_accounts_net

  nginx:
    restart: always
    container_name: easy_accounts_nginx
    image: 775495797/easyaccounts-nginx:4.0.0
    ports:
      - "10669:80"
    volumes:
      #- ./Web/dist:/usr/share/nginx/html                             #如若需要自行修改前端，请将前端放置在Web/dist目录下，并解开此行注释
      #- ./Web/nginx/default.conf:/etc/nginx/conf.d/default.conf      #如若需要自行修改nginx配置，请将配置文件放置在Web/nginx/default.conf目录下，并解开此行注释
      - ./Resource:/usr/share/nginx/html/resources                    #资源文件目录，此文件夹提供一个下载功能
    depends_on:
      - server
    networks:
      - easy_accounts_net

  server:
    restart: always
    container_name: easy_accounts_server
    image: 775495797/easyaccounts-server:2.5.1
    environment:
      #-------------------以下为服务端数据库环境变量，如果不需要外部部署数据库，请勿修改-------------------
      #- MYSQL_HOST=                            # 解开注释则需要填写数据库地址，否则默认为db
      #- MYSQL_PORT=                            # 解开注释则需要填写数据库端口号，否则默认为3306
      #- MYSQL_USERNAME=                        # 解开注释则需要填写数据库用户名，否则默认为root

      - DB_PASSWORD=easy_accounts               # 数据库密码,默认easy_accounts，如果使用外部数据库，请修改此处
      - SQL_BACKUP_TIME=00 00 22 * * ?          # SQL备份时间 corn表达式,默认每天晚上10点
      
      #-------------------以下为服务端登录功能环境变量-------------------
      - ENABLE_LOGIN=true                       # 是否启用登录功能，默认true
      - EXPIRED_TIME=30                         # 登录过期时间，默认30分钟，单位分钟
      - SINGLE_LOGIN=true                       # 是否启用单点登录，默认false
    volumes:
      - ./Resource/sql:/Ledger/backup                        #数据库备份文件目录
      - ./Resource/excel/month:/Ledger/excel/month           #excel 生成月度账单文件目录
      - ./Resource/excel/screen:/Ledger/excel/screen         #excel 生成筛选账单文件目录
      - ./Resource/images:/Ledger/images                     #图片上传文件目录
      - ./Server/logs:/Ledger/logs                           #日志文件目录
      - ./Server/auth:/Ledger/auth                           #登录认证文件目录,需要映射，否则重启后会丢失用户名密码 
                                                             #重置用户名密码请删除auth文件夹下的secret.key文件
      #- ./YD_JZ-SNAPSHOT.jar:/Ledger/app/YD_JZ-SNAPSHOT.jar #服务端jar包，如若需要自行修改，请将jar包放置在Server/app目录下，并修改此行
    depends_on:
      - db
    networks:
      - easy_accounts_net
  
  webhook:
    image: 775495797/easyaccounts-webhook:1.0.0
    container_name: easy_accounts_webhook
    restart: always
    volumes:
      - ./WebHook:/app/
      #- ./WebHook/webhook.py:/app/webhook.py            #如果要自行处理文件，则映射该文件
      #- ./WebHook/webhook-email.py:/app/webhook.py     #如需发送邮件服务，请解开此行注释，并填写下方的环境变量
    environment:
      - TZ=Asia/Shanghai
      - LOG_FILE=/app/hook.log
      - SEND_SQL_BACKUP=True                  # 是否发送SQL备份文件,默认True
      - SEND_EXCEL=True                       # 是否发送Excel文件，默认True

      # -------------------以下为发送邮件服务的环境变量-------------------
      - SMTP_SERVER=                          # SMTP服务器地址
      - SMTP_PORT=                            # SMTP端口
      - SMTP_MAIL=                            # 发件人邮箱，一般来说是SMTP账号，例如自己的QQ邮箱
      - SMTP_PASSWORD=                        # SMTP密码,一般来说是SMTP账号的授权码,需要自己去自己的邮箱中找到设置
      - SMTP_TO_LIST=                         # 收件人邮箱列表，用逗号分隔

    networks:
      - easy_accounts_net

  # AI智能助手服务（可选）
  # 如果不想使用AI功能，可以删除或注释掉整个ai服务块
  ai:
    image: 775495797/easyaccounts-ai:1.1.0
    container_name: easy_accounts_ai
    restart: always
    environment:
      #-------------------以下为LLM配置，请替换为您的实际配置-------------------
      - LLM_EASY_ACCOUNTS_API_KEY=sk-your-api-key-here    # 替换为您的 LLM API Key
      - LLM_EASY_ACCOUNTS_URL=https://api.openai.com/v1   # 替换为您的 LLM API 地址
      - LLM_EASY_ACCOUNTS_MODEL=gpt-3.5-turbo             # 替换为您要使用的模型

      #-------------------以下为MCP服务器配置-------------------
      - MCP_SERVER_ENABLED=false                          # 是否启用MCP服务器，默认false
      - MCP_TRANSPORT_MODE=sse                            # MCP传输模式: sse 或 streamable-http

    volumes:
      # 数据库持久化
      - ./AI/database:/app/koalaq_hub_python/resource/database
      # 日志文件映射
      - ./AI/logs:/app/logs
      # 自定义AI角色和指令（可选）
      - ./AI/小易.role:/app/koalaq_hub_python/resource/role/小易.role
      - ./AI/task.prompt:/app/koalaq_hub_python/resource/prompts/layers/task/easy_accounts_instructions.prompt
    
    depends_on:
      - server
    networks:
      - easy_accounts_net

networks:
  easy_accounts_net:
